# ─────────────────────────────────────────────────────────────────────────────
# Nginx configuration — Syntax Asia Salary System
#
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/syntax_asia
#          sudo ln -s /etc/nginx/sites-available/syntax_asia \
#                     /etc/nginx/sites-enabled/syntax_asia
#          sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   - Certbot must be run first to obtain SSL certificates
#   - Gunicorn systemd service must be running (deploy/syntax_asia.service)
#   - Replace every instance of YOUR_DOMAIN with your actual domain
# ─────────────────────────────────────────────────────────────────────────────

# Redirect all HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ACME challenge for certbot auto-renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── SSL (managed by certbot — do not edit these lines manually) ───────────
    # certbot will insert ssl_certificate and ssl_certificate_key here
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    # Belt-and-suspenders: these are also set by the Django middleware,
    # but Nginx headers are applied to ALL responses including static files.
    server_tokens off;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;

    # HSTS — tells browsers to only connect via HTTPS for 1 year
    # Only enable after confirming HTTPS works correctly
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Upload size limit ─────────────────────────────────────────────────────
    # Slightly above Django's FILE_UPLOAD_MAX_MEMORY_SIZE so Django can reject
    # oversized files with a proper error message rather than Nginx's bare 413.
    client_max_body_size 6M;

    # ── Static files (served by Nginx — never by Django) ─────────────────────
    location /static/ {
        alias /var/www/syntax_asia/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Media files (public uploads, e.g. company logo) ──────────────────────
    location /media/ {
        alias /var/www/syntax_asia/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── CRITICAL: salary_uploads/ must NEVER be served by Nginx ──────────────
    # These files contain all employee salary data.
    # Django controls access through authenticated views only.
    # There is intentionally no location block for /salary_uploads/.
    # If a request somehow reaches this path, return 404 immediately.
    location /salary_uploads/ {
        return 404;
    }

    # ── Proxy to Gunicorn ─────────────────────────────────────────────────────
    location / {
        proxy_pass http://unix:/run/syntax_asia/gunicorn.sock;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — generous for the Excel upload processing step
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        # Buffering — disable for streaming responses if any are added later
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/syntax_asia_access.log;
    error_log  /var/log/nginx/syntax_asia_error.log warn;
}