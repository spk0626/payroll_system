{% extends "base.html" %}

{% block title %}Access denied - {{ COMPANY_NAME }}{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h1 class="auth-card__title">Access denied</h1>
    <p class="auth-card__subtitle">You do not have permission to view this page.</p>
    <a class="btn btn--primary btn--full" href="{% url 'accounts:login' %}">Back to sign in</a>
  </div>
</div>
{% endblock %}
